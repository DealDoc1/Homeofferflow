<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta tags, links and other existing headers -->
</head>
<body>
<!-- Current body content -->
<script>
    window.initAutocomplete = function() {
        window._mapsReady = true;
        console.log('Google Maps loaded');
        if (window._hofPlacesSetup) window._hofPlacesSetup();

        // Existing Google Autocomplete setup
        const autocomplete = new google.maps.places.Autocomplete(
          document.getElementById('address'),
          {
            types: ['address'],
            componentRestrictions: { country: 'us' }
          }
        );

        // Additional Google Autocomplete setup for buyerMailAddr
        const buyerMailAutocomplete = new google.maps.places.Autocomplete(
          document.getElementById('buyerMailAddr'),
          {
            types: ['address'],
            componentRestrictions: { country: 'us' }
          }
        );

        buyerMailAutocomplete.addListener('place_changed', () => {
          const place = buyerMailAutocomplete.getPlace();

          if (place.formatted_address) {
            document.getElementById('buyerMailAddr').value =
              place.formatted_address;
          }
        });
  };
</script>
</body>
</html>
